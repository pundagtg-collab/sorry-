<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>maaf anyaa</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at top, #fff0f6, #ffd6e8, #ffc2dc);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    overflow: hidden;
}

/* ===== TEXT ===== */
.message {
    font-size: clamp(22px, 6vw, 34px);
    font-weight: 600;
    color: #444;
    max-width: 90%;
    line-height: 1.8;
    min-height: 200px;
    white-space: pre-line;
    padding: 20px;
}

.message span {
    opacity: 0;
    animation: appear 0.05s forwards;
}

@keyframes appear {
    to { opacity: 1; }
}

/* ===== BUTTON ===== */
.button {
    margin-top: 20px;
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    background: #ff69b4;
    color: white;
    cursor: pointer;
    opacity: 0;
    transform: scale(0.8);
    transition: 0.4s;
}

.button.show {
    opacity: 1;
    transform: scale(1);
}

.button:hover {
    transform: scale(1.1);
}

/* ===== FLOWER ===== */
.flower {
    position: relative;
    width: 250px;
    height: 400px;
    margin-top: 40px;
    opacity: 0;
    transform: scale(0.8);
    transition: 1.5s ease;
}

.flower.show {
    opacity: 1;
    transform: scale(1);
    animation: sway 4s ease-in-out infinite;
}

.stem {
    position: absolute;
    width: 12px;
    height: 240px;
    background: linear-gradient(to bottom, #2e8b57, #006400);
    bottom: 0;
    left: 119px;
    border-radius: 10px;
}

.leaf {
    position: absolute;
    width: 90px;
    height: 45px;
    background: linear-gradient(to right, #3cb371, #2e8b57);
    border-radius: 50px 0 50px 0;
}

.leaf.left {
    bottom: 130px;
    left: 40px;
    transform: rotate(-30deg);
}

.leaf.right {
    bottom: 90px;
    right: 40px;
    transform: rotate(30deg);
}

.petal {
    position: absolute;
    width: 110px;
    height: 180px;
    background: radial-gradient(circle at top, #ffffff, #f0f0f0);
    border-radius: 50% 50% 40% 40%;
    top: 20px;
    left: 70px;
    transform-origin: bottom center;
    transform: rotate(var(--r));
    box-shadow: 0 0 25px rgba(255,255,255,0.7);
}

.center {
    position: absolute;
    width: 30px;
    height: 120px;
    background: linear-gradient(to bottom, #ffcc33, #cc9900);
    border-radius: 15px;
    top: 90px;
    left: 110px;
}

/* sway */
@keyframes sway {
    0% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
    100% { transform: rotate(-2deg); }
}

/* ===== FIREWORK ===== */
.firework {
    position: absolute;
    width: 8px;
    height: 8px;
    background: gold;
    border-radius: 50%;
    opacity: 0;
}

.firework.active {
    animation: explode 1.5s ease-out infinite;
}

.firework:nth-of-type(1){ top:40px; left:10%;}
.firework:nth-of-type(2){ top:70px; left:80%;}
.firework:nth-of-type(3){ top:20px; left:50%;}
.firework:nth-of-type(4){ bottom:250px; left:20%;}
.firework:nth-of-type(5){ bottom:220px; right:15%;}
.firework:nth-of-type(6){ top:100px; right:5%;}

@keyframes explode {
    0% { transform: scale(0); opacity:1; }
    50% { transform: scale(6); opacity:1; }
    100% { transform: scale(10); opacity:0; }
}

/* ===== FALLING RINGS ===== */
.falling-ring {
    position: fixed;
    width: 25px;
    height: 25px;
    border: 4px solid white;
    border-radius: 50%;
    top: -40px;
    animation: fall linear forwards;
    pointer-events: none;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="message" id="typing"></div>

<button class="button" id="btn" onclick="clicked()">
mau pake lagi yaa?
</button>

<div class="flower" id="flower">
    <div class="petal" style="--r:0deg"></div>
    <div class="petal" style="--r:60deg"></div>
    <div class="petal" style="--r:120deg"></div>
    <div class="petal" style="--r:180deg"></div>
    <div class="petal" style="--r:240deg"></div>
    <div class="petal" style="--r:300deg"></div>
    <div class="center"></div>
    <div class="stem"></div>
    <div class="leaf left"></div>
    <div class="leaf right"></div>
</div>

<div class="firework"></div>
<div class="firework"></div>
<div class="firework"></div>
<div class="firework"></div>
<div class="firework"></div>
<div class="firework"></div>

<script>
let text = `anyaa baaikkkk dan paling cantikkkk 

maaf yaaa kemareen benerann lupaa buat pakeee cincinnyaaaa
maaf yaa udah buat anyaa kecewaa

plisss pake lagiii yaa cincinnya
janjii gak akaan akuu lepas lagiii

inii bungaa untuk anyaa`;

let container = document.getElementById("typing");
let flower = document.getElementById("flower");
let btn = document.getElementById("btn");
let fireworks = document.querySelectorAll(".firework");

let i = 0;

function typeLetter() {
    if (i < text.length) {
        let span = document.createElement("span");
        span.textContent = text[i];
        container.appendChild(span);
        i++;
        setTimeout(typeLetter, 35);
    } else {
        flower.classList.add("show");
        btn.classList.add("show");
        fireworks.forEach(f => f.classList.add("active"));
    }
}

function createRing() {
    let ring = document.createElement("div");
    ring.classList.add("falling-ring");
    ring.style.left = Math.random() * 100 + "vw";
    ring.style.animationDuration = (2 + Math.random() * 2) + "s";
    document.body.appendChild(ring);
    setTimeout(() => ring.remove(), 4000);
}

function clicked() {
    btn.innerHTML = "YEEEAAAAAY ANYAAAA MAUUUU";
    btn.style.background = "#ff1493";

    let interval = setInterval(createRing, 200);
    setTimeout(() => clearInterval(interval), 5000);
}

typeLetter();
</script>

</body>
</html>
